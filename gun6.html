<!DOCTYPE html>
<html>
<head>
    <title>待办清单</title>
    <style>
        .wrap { width: 480px; margin: 30px auto; border: 2px solid #28a745; padding: 20px; }
        #taskInput { width: 80%; padding: 8px; font-size: 16px; }
        #addBtn { padding: 8px 14px; background:#28a745; color:#fff; border:none; cursor:pointer; }
        li { margin:8px 0; font-size:17px; }
        .del { margin-left:10px; color:red; cursor:pointer; }
    </style>
</head>
<body>
    <div class="wrap">
        <h1>今日待办</h1>
        <input id="taskInput" placeholder="输入任务">
        <button id="addBtn">添加</button>
        <ul id="list"></ul>
    </div>
    <script>
        let input = document.getElementById("taskInput");
        let list = document.getElementById("list");
        document.getElementById("addBtn").onclick = function(){
            let val = input.value.trim();
            if(!val) return;
            let li = document.createElement("li");
            li.innerText = val;
            let del = document.createElement("span");
            del.className = "del";
            del.innerText = "删除";
            del.onclick = ()=>li.remove();
            li.appendChild(del);
            list.appendChild(li);
            input.value = "";
        }
    </script>
</body>
</html>
