<!DOCTYPE html>
<html>
<head>
    <title>笔记本3.0</title>
    <style>
        .container { width: 500px; margin: 0 auto; border: 2px solid #184; padding: 20px; border-radius: 8px; }
        .important { color: red; font-weight: bold; }
        textarea { width: 100%; height: 100px; margin: 10px 0; box-sizing: border-box; }
        .btns { display: flex; gap: 10px; margin-bottom: 15px; }
        button { padding: 6px 16px; cursor: pointer; }
        #noteDisplay { white-space: pre-wrap; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="appTitle">多功能记事本</h1>
        <textarea id="inputArea" placeholder="输入内容后保存"></textarea>
        <div class="btns">
            <button id="saveBtn">保存笔记</button>
            <button id="clearBtn">清空</button>
        </div>
        <h3>已保存笔记：</h3>
        <div id="noteDisplay" class="important"></div>

        <script>
            const input = document.getElementById('inputArea');
            const display = document.getElementById('noteDisplay');
            const saveBtn = document.getElementById('saveBtn');
            const clearBtn = document.getElementById('clearBtn');

            saveBtn.onclick = () => {
                display.innerText = input.value;
            }
            clearBtn.onclick = () => {
                input.value = '';
                display.innerText = '';
            }
        </script>
    </div>
</body>
</html>
